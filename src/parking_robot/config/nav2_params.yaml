# ==================================================
# nav2_params.yaml — 메카넘 가상 로봇용 Nav2 설정
# ==================================================
# 핵심: 가상 강체 중심점을 "전방향(Omni) 로봇 1대"로 취급
#       MPPI 컨트롤러로 메카넘의 vx, vy, ω 전부 활용

# ---- BT Navigator ----
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: virtual_base   # 가상 로봇의 base
    odom_topic: /virtual_robot/odom  # 분배 노드가 주는 가상 odom
    bt_loop_duration: 10
    default_server_timeout: 20

# ---- Controller Server (경로 추종) ----
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001   # 횡이동 임계 (메카넘)
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 30
      model_dt: 0.05
      batch_size: 1000
      # ===== 핵심: 전방향 모션 모델 =====
      motion_model: "Omni"          # 메카넘 = 전방향
      # 속도 제한
      vx_max: 0.08                  # 전후 최대 (m/s)
      vx_min: -0.08
      vy_max: 0.08                  # ★ 횡이동 허용 (홀로노믹)
      wz_max: 0.3                   # 회전 최대 (rad/s)
      # 비용 함수
      critics: [
        "ConstraintCritic", "GoalCritic", "GoalAngleCritic",
        "PathAlignCritic", "PathFollowCritic", "PathAngleCritic",
        "PreferForwardCritic", "ObstaclesCritic"
      ]
      ConstraintCritic:
        cost_weight: 4.0
      GoalCritic:
        cost_weight: 5.0
        threshold_to_consider: 0.2
      ObstaclesCritic:
        cost_weight: 10.0           # 장애물 회피 (기둥 등)
        collision_cost: 10000.0

# ---- Global Costmap (전체 맵) ----
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: virtual_base
      robot_radius: 0.15            # 가상 로봇 반경 (두 로봇+차량 감안)
      resolution: 0.05
      # CCTV가 만든 맵을 사용
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /parking/map    # ★ CCTV OccupancyGrid
      obstacle_layer:
        enabled: false              # CCTV가 장애물도 포함하므로 끔
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20
        cost_scaling_factor: 3.0
      plugins: ["static_layer", "inflation_layer"]

# ---- Local Costmap ----
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: virtual_base
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.15
      static_layer:
        map_topic: /parking/map
      inflation_layer:
        inflation_radius: 0.20
      plugins: ["static_layer", "inflation_layer"]

# ---- Planner Server (경로 계획) ----
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.05
      use_astar: true              # A* 경로 계획
      allow_unknown: false

# ---- Behavior Server ----
behavior_server:
  ros__parameters:
    use_sim_time: false
    behavior_plugins: ["wait"]
    wait:
      plugin: "nav2_behaviors/Wait"
